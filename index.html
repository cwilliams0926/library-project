<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <table>
      <caption>
        Books in the Library
      </caption>
      <thead>
        <tr>
          <th scope="col">Book Name</th>
          <th scope="col">Book ID</th>
          <th scope="col">Author</th>
          <th scope="col">Page Count</th>
          <th scope="col">Read</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <button id="open-button">New Book</button>
    <dialog id="dialog">
      <form action="" method="dialog">
        <label for="book-name">Name:</label>
        <input type="text" id="book-name" name="name" />
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" />
        <label for="page-count">Page Count:</label>
        <input type="number" id="page-count" name="pageCount" />
        <fieldset>
          <legend>Read?</legend>
          <label for="read-yes">Yes</label>
          <input type="radio" id="read-yes" name="readYes" />
          <label for="read-no">No</label>
          <input type="radio" id="read-no" name="readNo" />
        </fieldset>
      </form>
    </dialog>
  </body>
</html>
